
 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Laptop Bazaar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

<div class="glass p-8 md:p-12 rounded-[2.5rem] w-full max-w-md shadow-2xl m-4">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-black text-orange-500 italic">LAPTOP BAZAAR</h1>
        <p class="text-gray-400 text-sm mt-2">Create your account to start shopping</p>
    </div>

    <form action="/register" method="POST" class="space-y-4" onsubmit="return validatePassword()">
        <input type="text" name="username" placeholder="Full Name" required class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:outline-none focus:border-orange-500">
        
        <input type="email" name="email" placeholder="Email Address" required class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:outline-none focus:border-orange-500">
        
        <div class="relative">
            <input type="password" id="password" name="password" placeholder="Create Password" required class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:outline-none focus:border-orange-500">
            <i class="far fa-eye absolute right-4 top-4 cursor-pointer text-gray-500" onclick="togglePass('password', this)"></i>
        </div>

        <div class="relative">
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:outline-none focus:border-orange-500">
            <i class="far fa-eye absolute right-4 top-4 cursor-pointer text-gray-500" onclick="togglePass('confirm_password', this)"></i>
        </div>

        <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 py-4 rounded-full font-bold shadow-lg transition-all mt-4">REGISTER NOW</button>
    </form>

    <p class="mt-6 text-center text-gray-400 text-sm">
        Already have an account? <a href="/login" class="text-orange-500 font-bold hover:underline">Login</a>
    </p>
</div>

<script>
    function togglePass(id, icon) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    function validatePassword() {
        const pass = document.getElementById("password").value;
        const confirm = document.getElementById("confirm_password").value;
        if (pass !== confirm) {
            alert("Passwords do not match!");
            return false;
        }
        return true;
    }
</script>
</body>
</html>

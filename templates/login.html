 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Laptop Bazaar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Toast Animation */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #ea580c; /* Orange-600 */
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            right: 30px;
            top: 30px;
            font-weight: bold;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative">

    <div id="toast"></div>

    <a href="/" class="absolute top-8 left-8 text-gray-400 hover:text-orange-500 transition-all font-bold flex items-center gap-2">
        <i class="fas fa-arrow-left"></i> BACK TO HOME
    </a>

    <div class="glass p-8 md:p-12 rounded-[2.5rem] w-full max-w-md shadow-2xl m-4 border border-white/10">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-orange-500 italic tracking-tighter uppercase">LAPTOP BAZAAR</h1>
            <h2 class="text-xl font-bold mt-6">Welcome Back</h2>
        </div>

        <form action="/login" method="POST" class="space-y-6">
            <input type="email" name="email" placeholder="Email Address" required 
            class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-orange-500 text-white">
            
            <div class="relative">
                <input type="password" id="login_pass" name="password" placeholder="Password" required 
                class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-orange-500 text-white">
                <i class="far fa-eye absolute right-5 top-5 cursor-pointer text-gray-500" onclick="togglePass('login_pass', this)"></i>
            </div>

            <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 py-4 rounded-full font-black shadow-lg transition-all uppercase tracking-wider">
                LOG IN
            </button>
        </form>

        <p class="mt-8 text-center text-gray-400 text-sm">
            New here? <a href="/register" class="text-orange-500 font-bold hover:underline">Create Account</a>
        </p>
    </div>

   <div id="flash-data" data-message="{{ get_flashed_messages()[0] if get_flashed_messages() else '' }}"></div>

<script>
    function togglePass(id, icon) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    // Ab JS ko Jinja se alag rakhenge
    window.onload = function() {
        const flashData = document.getElementById("flash-data");
        const message = flashData.getAttribute("data-message");

        if (message && message !== "") {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.add("show");
            
            // 3 second baad toast hide kar do
            setTimeout(function(){ 
                toast.classList.remove("show"); 
            }, 3000);
        }
    };
</script>
</body>
</html>
